<!DOCTYPE html>
<html>
<head>
<title>BMI Checker</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
    width:300px;
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#2a5298;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1e3c72;
}

.result{
    margin-top:20px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>BMI Calculator</h2>

<input id="height" type="number" placeholder="Height (meters)" step="0.01">

<input id="weight" type="number" placeholder="Weight (kg)">

<button onclick="calculateBMI()">Calculate BMI</button>

<div class="result" id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
